// ============ JEBAR data store ============
const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;

const LS_KEY = 'jebar_db_v1';
const SET_KEY = 'jebar_settings_v1';

const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const THAI_MONTHS_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function clone(o){ return JSON.parse(JSON.stringify(o)); }

// ---------- appearance ----------
const FONT_OPTIONS = ['Noto Sans Thai','IBM Plex Sans Thai','Sarabun','Prompt','Kanit','Mitr'];
const ACCENT_OPTIONS = [
  {name:'Apple Blue', value:'#0071e3'},
  {name:'แบรนด์ JE BAR', value:'#a8773f'},
  {name:'สเลท', value:'#3a3a3c'},
  {name:'เขียว', value:'#1f8a5b'},
  {name:'ม่วง', value:'#7d5bd6'},
  {name:'แดงอิฐ', value:'#c0492f'},
];
function mixWhite(hex, t){
  const c=(hex||'#0071e3').replace('#',''); const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  const m=v=>Math.round(v+(255-v)*t);
  return `rgb(${m(r)},${m(g)},${m(b)})`;
}
function rgbaOf(hex, a){
  const c=(hex||'#0071e3').replace('#',''); const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function applyAppearance(s){
  const root=document.documentElement;
  const dark = s.theme==='dark';
  root.setAttribute('data-theme', dark?'dark':'light');
  const accent=s.accent||'#0071e3';
  root.style.setProperty('--accent', accent);
  root.style.setProperty('--accent-soft', dark? rgbaOf(accent,0.24) : mixWhite(accent, 0.88));
  const font=s.font||'Noto Sans Thai';
  root.style.setProperty('--font', `"${font}",-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif`);
}

// normalize any date value → 'YYYY-MM-DD' (handles ISO, DD/MM/YYYY, serial, "Fri May 01 2026", Date)
function normDate(v){
  if(v==null) return '';
  const iso = dt => dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2);
  if(v instanceof Date && !isNaN(v)) return iso(v);
  v=String(v).trim(); if(!v) return '';
  let m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m) return m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2);
  m=v.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{2,4})/); if(m){ let y=+m[3]; if(y<100)y+=2000; if(y>2500)y-=543; return y+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2); }
  if(/^\d+(\.\d+)?$/.test(v)){ const n=+v; if(n>1000&&n<100000){ const dt=new Date(Date.UTC(1899,11,30)+Math.round(n)*86400000); return dt.getUTCFullYear()+'-'+('0'+(dt.getUTCMonth()+1)).slice(-2)+'-'+('0'+dt.getUTCDate()).slice(-2); } }
  const d=new Date(v); if(!isNaN(d)) return iso(d);
  return '';
}
const fixSalesDates = arr => (arr||[]).map(s=>({...s, date: normDate(s.date)})).filter(s=>s.date);

// auto-generate next code like PRE001 (editable by user afterwards)
function nextCode(items, prefix){
  let max=0; (items||[]).forEach(it=>{ const m=(it.id||'').match(new RegExp('^'+prefix+'(\\d+)$')); if(m) max=Math.max(max,+m[1]); });
  return prefix+String(max+1).padStart(3,'0');
}
// duplicate-name check (case-insensitive), ignoring the record currently being edited
function dupName(items, name, key, currentId){
  const n=(name||'').trim().toLowerCase(); if(!n) return false;
  return (items||[]).some(it=> (it.name||'').trim().toLowerCase()===n && it[key]!==currentId );
}

// แปลง yield ที่ผิด (เช่น 100 หรือ 90 ที่หมายถึง %) ให้เป็นสัดส่วน 0–1 + คำนวณต้นทุน/หน่วยใหม่
function fixYields(db){
  if(!db || !Array.isArray(db.ingredients)) return db;
  db.ingredients = db.ingredients.map(i=>{
    let y = +i.yield; if(!y || isNaN(y)) y = 1;
    if(y > 1.5) y = y/100;            // 100 → 1, 90 → 0.9 (กรอกมาเป็น %)
    y = Math.max(0.01, Math.min(1, y)); // ไม่เกิน 100% และไม่ต่ำเกินไป
    if(y !== i.yield){
      const q = (+i.buyQty||0)*y;
      const cpu = q ? (+i.buyPrice||0)/q : (i.costPerUnit||0);
      return { ...i, yield:y, costPerUnit:cpu };
    }
    return i;
  });
  return db;
}
function loadDB(){
  try{ const s = localStorage.getItem(LS_KEY); if(s){ let d=JSON.parse(s); if(!d.branches) d.branches=['JE BAR']; d.dailySales=fixSalesDates(d.dailySales); d=fixYields(d); return d; } }catch(e){}
  const seed = clone(window.JEBAR_SEED);
  if(!seed.branches) seed.branches=['JE BAR'];
  seed.dailySales=fixSalesDates(seed.dailySales);
  return fixYields(seed);
}
// filter daily sales by active branch ('ทั้งหมด' = all; records without branch always count)
function salesForBranch(sales, branch){
  if(!branch || branch==='ทั้งหมด') return sales;
  return sales.filter(s=> (s.branch||'')===branch );
}
// save with optional native "Save As" folder picker (falls back to normal download)
async function saveFileSmart(filename, content, type, pick){
  const blob = content instanceof Blob ? content : new Blob([content], {type: type||'application/octet-stream'});
  if(pick && window.showSaveFilePicker){
    try{
      const ext=(filename.split('.').pop()||'dat').toLowerCase();
      const accept={}; accept[type||'application/octet-stream']=['.'+ext];
      const handle=await window.showSaveFilePicker({suggestedName:filename, types:[{description:'ไฟล์ส่งออก', accept}]});
      const w=await handle.createWritable(); await w.write(blob); await w.close();
      return 'saved';
    }catch(e){ if(e&&e.name==='AbortError') return 'cancel'; }
  }
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  return 'download';
}
function loadSettings(){
  const def = { estGP: 0.65, target: 300000, avgPrice: 0, accent:'#0071e3', lineCommission: 0.32,
    lineMarkup: 0.45, priceTargetGP: 0.65,
    shopName:'JE BAR', shopTagline:'Coffee & Pastry', logo:(window.JEBAR_LOGO||'assets/logo.png'),
    font:'Noto Sans Thai', displaySize:1, salesChart:'bar',
    theme:'light', pinEnabled:false, pin:'', lastBackup:0,
    vatEnabled:false, vatRate:0.07, vatMode:'inclusive',
    gpAlertThreshold:0.5, alertsEnabled:true, activeBranch:'ทั้งหมด', askSaveLocation:false,
    cloudEnabled:false, cloudUrl:'', cloudKey:'', shopCode:'jebar',
    sheetEnabled:false, sheetUrl:'', sheetMode:'csv', sheetCsvUrl:'', sheetFullUrl:'' };
  try{ const s = localStorage.getItem(SET_KEY); if(s){ const o=Object.assign(def, JSON.parse(s));
    if(!o.logo || /^assets\//.test(o.logo)) o.logo = window.JEBAR_LOGO || o.logo;
    return o; } }catch(e){}
  return def;
}

// ---------- formatting ----------
const fmt = (n, d=0) => {
  if(n===null||n===undefined||isNaN(n)) return '–';
  return Number(n).toLocaleString('th-TH',{minimumFractionDigits:d, maximumFractionDigits:d});
};
const fmtB = (n, d=0) => '฿' + fmt(n, d);
const fmtPct = (n, d=1) => (n===null||isNaN(n))?'–':(n*100).toLocaleString('th-TH',{minimumFractionDigits:d,maximumFractionDigits:d})+'%';
const monthKey = iso => iso ? iso.slice(0,7) : '';
const THAI_WEEKDAYS = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const weekdayOf = iso => iso ? new Date(iso+'T00:00:00Z').getUTCDay() : 0;
const monthIdx = iso => iso ? parseInt(iso.slice(5,7),10)-1 : 0;
const yearOf = iso => iso ? iso.slice(0,4) : '';
const fmtDate = iso => {
  if(!iso) return '–';
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return String(iso);
  return `${+m[3]} ${THAI_MONTHS_SHORT[+m[2]-1]} ${+m[1]+543}`;
};

// ---------- cost engine (live) ----------
// recompute a menu's cost from CURRENT ingredient/package costs so editing prices flows through
function computeMenuCost(db, menuId){
  const ingMap = Object.fromEntries(db.ingredients.map(i=>[i.id,i]));
  const pkgMap = Object.fromEntries(db.packages.map(p=>[p.id,p]));
  let base=0, baseLines=[];
  for(const r of db.recipeBase.filter(r=>r.menuId===menuId)){
    const ing = ingMap[r.ingId];
    const cpu = ing ? ing.costPerUnit : r.costPerUnit;
    const lc = r.qty * cpu;
    base += lc;
    baseLines.push({...r, name: ing?ing.name:r.ingId, costPerUnit:cpu, lineCost:lc});
  }
  let pkg=0, pkgLines=[];
  for(const r of db.recipePackage.filter(r=>r.menuId===menuId)){
    const p = pkgMap[r.pkgId];
    const cpp = p ? p.costPerPiece : r.costPerPiece;
    const lc = r.qty * cpp;
    pkg += lc;
    pkgLines.push({...r, name:p?p.name:r.pkgId, costPerPiece:cpp, lineCost:lc});
  }
  let opt=0, optLines=[], optByOption={};
  for(const r of db.recipeOption.filter(r=>r.menuId===menuId)){
    const ing = ingMap[r.ingId];
    const cpu = ing ? ing.costPerUnit : r.costPerUnit;
    const lc = r.qty * cpu;
    optLines.push({...r, ingName: ing?ing.name:r.ingId, costPerUnit:cpu, lineCost:lc});
    optByOption[r.optionId] = (optByOption[r.optionId]||0) + lc; // รวมต้นทุนวัตถุดิบของแต่ละตัวเลือก
  }
  // ลูกค้าเลือกออปชัน 1 ตัวต่อแก้ว → ใช้ "ค่าเฉลี่ยต่อตัวเลือก" เป็นตัวแทนต้นทุน (ไม่บวกรวมทุกตัว)
  const optionCosts = Object.values(optByOption);
  const optAvg = optionCosts.length ? optionCosts.reduce((s,x)=>s+x,0)/optionCosts.length : 0;
  const total = base + pkg + optAvg;
  const hasRecipe = baseLines.length>0 || pkgLines.length>0 || optLines.length>0;
  return { base, pkg, opt:optAvg, optAvg, optByOption, optionCosts, total, baseLines, pkgLines, optLines, hasRecipe };
}

function menuEconomics(db, menu){
  const c = computeMenuCost(db, menu.id);
  const gpStore = menu.priceStore - c.total;
  const gpLine = menu.priceLine - c.total;
  return {
    ...c,
    gpStore, gpLine,
    gpStorePct: menu.priceStore? gpStore/menu.priceStore : 0,
    gpLinePct: menu.priceLine? gpLine/menu.priceLine : 0,
  };
}

// ---------- sales aggregation ----------
function dailyTotal(d){ return (d.store||0)+(d.line||0)+(d.other||0); }

function aggregateByMonth(db){
  const map = {};
  for(const d of db.dailySales){
    const k = monthKey(d.date);
    if(!map[k]) map[k] = { key:k, monthIdx:monthIdx(d.date), year:yearOf(d.date), store:0, line:0, other:0, days:0 };
    map[k].store += d.store||0; map[k].line += d.line||0; map[k].other += d.other||0; map[k].days++;
  }
  return Object.values(map).map(m=>({...m, total:m.store+m.line+m.other})).sort((a,b)=>a.key<b.key?-1:1);
}

function overheadTotal(db){ return db.overhead.reduce((s,o)=>s+(o.amount||0),0); }

function avgSellingPrice(db){
  const sold = db.menus.filter(m=>m.status==='ขาย' && m.priceStore>0);
  if(!sold.length) return 0;
  return sold.reduce((s,m)=>s+m.priceStore,0)/sold.length;
}

// blended GP% across menus that actually have a recipe
function recipeGPStats(db){
  const withR = db.menus.map(m=>({m, e:menuEconomics(db,m)})).filter(x=>x.e.hasRecipe && x.m.priceStore>0);
  if(!withR.length) return { count:0, avgGPpct:0, avgCost:0 };
  const avgGPpct = withR.reduce((s,x)=>s+x.e.gpStorePct,0)/withR.length;
  const avgCost = withR.reduce((s,x)=>s+x.e.total,0)/withR.length;
  return { count:withR.length, avgGPpct, avgCost };
}

// ---------- context ----------
const DataCtx = createContext(null);
function useData(){ return useContext(DataCtx); }

function DataProvider({children}){
  const [db, setDb] = useState(loadDB);
  const [settings, setSettings] = useState(loadSettings);
  const [toast, setToast] = useState(null);

  useEffect(()=>{ try{ localStorage.setItem(LS_KEY, JSON.stringify(db)); }catch(e){} }, [db]);
  useEffect(()=>{ try{ localStorage.setItem(SET_KEY, JSON.stringify(settings)); }catch(e){} applyAppearance(settings); }, [settings]);

  const flash = useCallback((msg, kind='ok', action=null)=>{ setToast({msg,kind,action,id:Date.now()}); }, []);
  useEffect(()=>{ if(toast){ const t=setTimeout(()=>setToast(null), toast.action?5000:2600); return ()=>clearTimeout(t); } }, [toast]);

  // generic collection ops
  const upsert = useCallback((coll, item, key='id')=>{
    setDb(prev=>{
      const next = {...prev, [coll]:[...prev[coll]]};
      const i = next[coll].findIndex(x=>x[key]===item[key]);
      if(i>=0) next[coll][i] = item; else next[coll] = [item, ...next[coll]];
      return next;
    });
  },[]);
  const remove = useCallback((coll, id, key='id')=>{
    setDb(prev=>({...prev, [coll]: prev[coll].filter(x=>x[key]!==id)}));
  },[]);
  const setCollection = useCallback((coll, arr)=>{ setDb(prev=>({...prev,[coll]:arr})); },[]);
  // rename an id and cascade to linked recipe references
  const renameId = useCallback((coll, oldId, newId)=>{
    setDb(prev=>{
      const next={...prev};
      next[coll]=prev[coll].map(x=>x.id===oldId?{...x,id:newId}:x);
      if(coll==='menus'){
        next.recipeBase=prev.recipeBase.map(r=>r.menuId===oldId?{...r,menuId:newId}:r);
        next.recipeOption=prev.recipeOption.map(r=>r.menuId===oldId?{...r,menuId:newId}:r);
        next.recipePackage=prev.recipePackage.map(r=>r.menuId===oldId?{...r,menuId:newId}:r);
      } else if(coll==='ingredients'){
        next.recipeBase=prev.recipeBase.map(r=>r.ingId===oldId?{...r,ingId:newId}:r);
        next.recipeOption=prev.recipeOption.map(r=>r.ingId===oldId?{...r,ingId:newId}:r);
      } else if(coll==='packages'){
        next.recipePackage=prev.recipePackage.map(r=>r.pkgId===oldId?{...r,pkgId:newId}:r);
      } else if(coll==='options'){
        next.recipeOption=prev.recipeOption.map(r=>r.optionId===oldId?{...r,optionId:newId}:r);
      }
      return next;
    });
  },[]);

  // sales specific (key by date)
  const saveSale = useCallback((sale)=>{
    setDb(prev=>{
      const s={...sale, date: normDate(sale.date)};
      if(!s.date) return prev;
      const arr=[...prev.dailySales];
      const i=arr.findIndex(x=>x.date===s.date);
      if(i>=0) arr[i]=s; else arr.push(s);
      arr.sort((a,b)=>a.date<b.date?-1:1);
      return {...prev, dailySales:arr};
    });
  },[]);
  const removeSale = useCallback((date)=>{ setDb(prev=>({...prev, dailySales:prev.dailySales.filter(s=>s.date!==date)})); },[]);

  const resetData = useCallback(()=>{ setDb(clone(window.JEBAR_SEED)); flash('คืนค่าข้อมูลเริ่มต้นแล้ว'); },[flash]);
  const importDB = useCallback((obj)=>{ setDb(fixYields(obj)); flash('นำเข้าข้อมูลสำเร็จ'); },[flash]);

  const value = {
    db, setDb, settings, setSettings,
    fdb: { ...db, dailySales: salesForBranch(db.dailySales, settings.activeBranch) },
    upsert, remove, setCollection, renameId, saveSale, removeSale, resetData, importDB,
    flash, toast, setToast,
    THAI_MONTHS, THAI_MONTHS_SHORT, THAI_WEEKDAYS,
  };
  return <DataCtx.Provider value={value}>{children}</DataCtx.Provider>;
}

const { useState: useStateC, useMemo: useMemoC, useId } = React;

// ---- Area / line chart ----
function LineChart({ data, height=220, color='#0071e3', label, valueFmt=(v=>v), xlabels, fill=true }){
  // data: [{x, y}]
  const gid = useId().replace(/:/g,'');
  const W = 760, H = height, padL=8, padR=8, padT=18, padB=26;
  const xs = data.map((d,i)=>i);
  const max = Math.max(1, ...data.map(d=>d.y));
  const min = 0;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const px = i => padL + (data.length<=1?innerW/2:(i/(data.length-1))*innerW);
  const py = v => padT + innerH - ((v-min)/(max-min))*innerH;
  const linePts = data.map((d,i)=>`${px(i)},${py(d.y)}`).join(' ');
  const areaPts = `${padL},${py(min)} ` + linePts + ` ${px(data.length-1)},${py(min)}`;
  const peak = data.reduce((a,d,i)=> d.y>data[a].y?i:a, 0);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}} preserveAspectRatio="none">
      <defs>
        <linearGradient id={'g'+gid} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0.25,0.5,0.75,1].map((f,i)=>(
        <line key={i} x1={padL} x2={W-padR} y1={padT+innerH*f} y2={padT+innerH*f} stroke="var(--hover)" strokeWidth="1"/>
      ))}
      <polygon points={areaPts} fill={fill?`url(#g${gid})`:'none'}/>
      <polyline points={linePts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={px(peak)} cy={py(data[peak].y)} r="4.5" fill="#fff" stroke={color} strokeWidth="2.5"/>
      {xlabels && data.map((d,i)=> (xlabels(i,d.x) ?
        <text key={i} x={px(i)} y={H-8} fontSize="11" fill="var(--ink-3)" textAnchor="middle" fontFamily="var(--font)">{xlabels(i,d.x)}</text> : null))}
    </svg>
  );
}

// ---- Stacked / grouped bar chart ----
function BarChart({ data, series, height=240, valueFmt=(v=>v) }){
  // data: [{label, values:{key:num}}], series:[{key,color,name}]
  const W=760, H=height, padT=18, padB=30, padL=8, padR=8;
  const innerW=W-padL-padR, innerH=H-padT-padB;
  const totals = data.map(d=>series.reduce((s,se)=>s+(d.values[se.key]||0),0));
  const max = Math.max(1, ...totals);
  const n = data.length;
  const slot = innerW/n;
  const bw = Math.min(46, slot*0.56);
  const py = v => padT + innerH - (v/max)*innerH;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
      {[0.25,0.5,0.75,1].map((f,i)=>(
        <line key={i} x1={padL} x2={W-padR} y1={padT+innerH*f} y2={padT+innerH*f} stroke="var(--hover)" strokeWidth="1"/>
      ))}
      {data.map((d,i)=>{
        const cx = padL + slot*i + slot/2;
        let acc=0;
        return (
          <g key={i}>
            {series.map((se,si)=>{
              const v = d.values[se.key]||0;
              const h = (v/max)*innerH;
              const y = py(acc+v);
              acc+=v;
              const topR = si===series.length-1?5:0;
              return v>0 ? (
                <rect key={se.key} x={cx-bw/2} y={y} width={bw} height={Math.max(0,h)} rx="3" fill={se.color}/>
              ) : null;
            })}
            <text x={cx} y={H-9} fontSize="11" fill="var(--ink-3)" textAnchor="middle" fontFamily="var(--font)">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ---- Donut ----
function Donut({ segments, size=170, thickness=26, center }){
  // segments:[{value,color,name}]
  const total = segments.reduce((s,x)=>s+x.value,0)||1;
  const r = (size-thickness)/2, cx=size/2, cy=size/2, C=2*Math.PI*r;
  let acc=0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--chip)" strokeWidth={thickness}/>
      {segments.map((s,i)=>{
        const frac = s.value/total;
        const dash = frac*C;
        const off = acc*C;
        acc+=frac;
        return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={thickness}
          strokeDasharray={`${dash} ${C-dash}`} strokeDashoffset={-off} transform={`rotate(-90 ${cx} ${cy})`}
          strokeLinecap="butt" style={{transition:'stroke-dasharray .6s'}}/>;
      })}
      {center && <text x={cx} y={cy-2} textAnchor="middle" fontSize="22" fontWeight="600" fill="var(--ink)" fontFamily="var(--font)">{center.top}</text>}
      {center && <text x={cx} y={cy+16} textAnchor="middle" fontSize="11" fill="var(--ink-3)" fontFamily="var(--font)">{center.bot}</text>}
    </svg>
  );
}

// ---- Sparkline ----
function Sparkline({ data, color='#0071e3', width=120, height=34 }){
  if(!data || data.length<2) return null;
  const max=Math.max(...data), min=Math.min(...data);
  const px=i=>(i/(data.length-1))*width;
  const py=v=>height-2 - ((v-min)/((max-min)||1))*(height-4);
  const pts=data.map((d,i)=>`${px(i)},${py(d)}`).join(' ');
  return <svg width={width} height={height} style={{display:'block'}}>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

// ---- Horizontal ranking bars ----
function HBars({ items, color='#0071e3', valueFmt=(v=>v) }){
  const max = Math.max(1, ...items.map(i=>i.value));
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {items.map((it,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:26,height:26,borderRadius:8,background:i<3?'var(--accent-soft)':'var(--chip)',color:i<3?'var(--accent)':'var(--ink-3)',
            display:'grid',placeItems:'center',fontWeight:600,fontSize:13,flexShrink:0}}>{i+1}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,gap:8}}>
              <span style={{fontSize:13.5,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{it.label}</span>
              <span className="tnum" style={{fontSize:13.5,fontWeight:600,color:'var(--ink-2)',flexShrink:0}}>{valueFmt(it.value)}</span>
            </div>
            <div style={{height:7,background:'var(--chip)',borderRadius:5,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${(it.value/max)*100}%`,background:it.color||color,borderRadius:5,
                transition:'width .8s cubic-bezier(.22,.61,.36,1)'}}/>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// switches between stacked bars / line / area based on user setting
function SalesChart({ data, series, height=240, type='bar' }){
  if(!type || type==='bar') return <BarChart data={data} series={series} height={height}/>;
  const totals=data.map(d=>({x:d.label, y:series.reduce((s,se)=>s+(d.values[se.key]||0),0)}));
  const step=Math.max(1,Math.ceil(data.length/9));
  return <LineChart data={totals} height={height} color={series[0].color} fill={type==='area'}
    xlabels={(i)=> (i%step===0||i===data.length-1)?data[i].label:null}/>;
}

            <td className="tnum" style={{textAlign:'right',padding:'14px',color:'var(--accent)'}}>{fmt(cur.total)}</td>
            <td></td>

      </div>
    </div>;
  }

  return <div style={{display:'flex',flexDirection:'column',gap:20}}>
    <div style={{display:'flex',justifyContent:'center'}}>
      <Segmented value={period} onChange={setPeriod} options={[{value:'day',label:'รายวัน'},{value:'month',label:'รายเดือน'},{value:'year',label:'รายปี'},{value:'range',label:'ช่วงเอง'}]}/>
    </div>
    {period==='day'?<Daily/>:period==='month'?<Monthly/>:period==='year'?<Yearly/>:<Range/>}
  </div>;
}

function ProductAnalysis(){
  const { db, settings, setSettings } = useData();
  const comm = settings.lineCommission ?? 0.32;
  const markup = settings.lineMarkup ?? 0.45;
  const targetGP = settings.priceTargetGP ?? 0.65;
  const [q,setQ]=React.useState('');
  const [cat,setCat]=React.useState('');
  const [sort,setSort]=React.useState('gpStore');
  const [onlyRecipe,setOnlyRecipe]=React.useState(false);
  const roundB = v => Math.round(v); // ปัดเป็นบาทเต็ม
  const coverMarkup = comm<1 ? comm/(1-comm) : null; // ส่วนบวกขั้นต่ำที่ทำให้กำไรไลน์ = หน้าร้าน

  // build economics for every priced menu
  const rows = db.menus.filter(m=>m.priceStore>0).map(m=>{
    const e = menuEconomics(db, m);
    const lineNet = m.priceLine*(1-comm);                 // เงินที่ได้จริงหลังหัก % LINE MAN
    const obsMarkup = m.priceStore? (m.priceLine-m.priceStore)/m.priceStore : 0;
    const lineNetVsStore = lineNet - m.priceStore;         // ส่วนต่างหลังหักค่าคอม เทียบหน้าร้าน
    const gpLineNet = e.hasRecipe ? lineNet - e.total : null;
    const gpLineNetPct = (e.hasRecipe && m.priceLine) ? gpLineNet/m.priceLine : null;
    // ราคาแนะนำ
    const recStore = e.hasRecipe && targetGP<1 ? roundB(e.total/(1-targetGP)) : null;  // อิงต้นทุน + GP เป้าหมาย
    const recBase = recStore ?? m.priceStore;
    const recLine = roundB(recBase*(1+markup));            // ราคาร้านแนะนำ + ส่วนบวกไลน์แมน
    return { m, e, lineNet, markup:obsMarkup, lineNetVsStore, gpLineNet, gpLineNetPct, recStore, recLine,
      covered: m.priceLine>0 ? lineNet>=m.priceStore : null };
  });

  let view = rows.filter(r=>
    (!q || r.m.name.toLowerCase().includes(q.toLowerCase()) || r.m.id.toLowerCase().includes(q.toLowerCase())) &&
    (!cat || r.m.category===cat) &&
    (!onlyRecipe || r.e.hasRecipe)
  );
  const sorters={
    gpStore:(a,b)=>(b.e.gpStorePct)-(a.e.gpStorePct),
    gpLine:(a,b)=>(b.gpLineNetPct??-9)-(a.gpLineNetPct??-9),
    markup:(a,b)=>b.markup-a.markup,
    price:(a,b)=>b.m.priceStore-a.m.priceStore,
    name:(a,b)=>a.m.name.localeCompare(b.m.name,'th'),
  };
  view = [...view].sort(sorters[sort]);

  // aggregates
  const withLine = rows.filter(r=>r.m.priceLine>0);
  const coveredN = withLine.filter(r=>r.covered).length;
  const avgMarkup = withLine.length? withLine.reduce((s,r)=>s+r.markup,0)/withLine.length : 0;
  const recipeRows = rows.filter(r=>r.e.hasRecipe);

  const avgGPline = recipeRows.length? recipeRows.reduce((s,r)=>s+(r.gpLineNetPct||0),0)/recipeRows.length : 0;

  // category avg GP (recipe menus)
  const catMap={};

  const catBars=Object.entries(catMap).map(([c,arr])=>({label:c,value:(arr.reduce((s,x)=>s+x,0)/arr.length)*100,color:'#0071e3'})).sort((a,b)=>b.value-a.value);

  // GP distribution buckets (recipe menus, store)
  const buckets=[['<40%',0,0.4],['40–55%',0.4,0.55],['55–65%',0.55,0.65],['65–75%',0.65,0.75],['>75%',0.75,99]];

      {view.length===0 && <Empty icon="cup" title="ไม่พบเมนู"/>}
    </Card>
    <p style={{fontSize:12,color:'var(--ink-3)',textAlign:'center',lineHeight:1.7}}>

    </p>
  </div>;
}

// ============ วิเคราะห์เชิงลึก (Deep Analytics) ============
// #1 GP ต่อเมนู · #3 เมนูใช้ Fallback (ต้นทุนสำรอง) · #4 กำไรจริง LINE MAN
// #2 ยอดขายต่อเมนู (อันดับขายดี ราย วัน/สัปดาห์/เดือน/ปี) · #5 Heatmap ชั่วโมงขายดี

// ---------- helpers ----------
function dpNum(v){ const n=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; }
function dpNormName(s){ return String(s||'').trim().toLowerCase(); }
function dpDetectCol(header, keys){
  const norm=header.map(h=>dpNormName(h));
  // 1) exact match (กันคอลัมน์ที่มีคำซ้อนอยู่ในข้อความยาว เช่น "ต้นทุน ... x จำนวนการขาย")
  for(let i=0;i<norm.length;i++){ if(keys.some(k=>norm[i]===dpNormName(k))) return i; }
  // 2) startsWith
  for(let i=0;i<norm.length;i++){ if(keys.some(k=>norm[i].startsWith(dpNormName(k)))) return i; }
  // 3) includes
  for(let i=0;i<norm.length;i++){ if(keys.some(k=>norm[i].includes(dpNormName(k)))) return i; }
  return -1;
}
function dpFromYmd(s){ // "20260525" -> "2026-05-25"
  const m=String(s).match(/^(\d{4})(\d{2})(\d{2})$/); return m? `${m[1]}-${m[2]}-${m[3]}` : '';
}
function dpRangeFromName(name){
  const m=String(name).match(/(\d{8})\s*[-–]\s*(\d{8})/);
  if(m) return { start:dpFromYmd(m[1]), end:dpFromYmd(m[2]) };
  const one=String(name).match(/(\d{8})/);
  if(one) return { start:dpFromYmd(one[1]), end:dpFromYmd(one[1]) };
  return { start:'', end:'' };
}
function dpSpanOf(start,end){
  if(!start||!end) return 'custom';
  const d=Math.round((new Date(end)-new Date(start))/86400000);
  if(d<=0) return 'day'; if(d<=9) return 'week'; if(d<=45) return 'month'; return 'year';
}
const DP_SPAN_LABEL={day:'รายวัน',week:'รายสัปดาห์',month:'รายเดือน',year:'รายปี',custom:'กำหนดเอง'};
function dpReportLabel(r){
  if(r.start && r.end && r.start!==r.end) return `${window.fmtDate(r.start)} – ${window.fmtDate(r.end)}`;
  if(r.start) return window.fmtDate(r.start);
  return r.label||'ไม่ระบุช่วง';
}

// join imported menu rows with live menu economics (GP)
function dpJoinEconomics(db, rows){
  const byName = Object.fromEntries(db.menus.map(m=>[dpNormName(m.name),m]));
  return rows.map(r=>{
    const m = byName[dpNormName(r.name)];
    const e = m ? window.menuEconomics(db,m) : null;
    const gpPct = e && e.hasRecipe ? e.gpStorePct : null;
    const profit = e && e.hasRecipe ? r.qty*(m.priceStore-e.total) : null;
    return { ...r, menu:m||null, matched:!!m, gpPct, profit };
  });
}

// ---------- smart importer (ranking OR hourly) ----------
function DeepImport({ onClose }){
  const { db, setDb, flash } = useData();
  const [parsed,setParsed]=React.useState(null); // {type, rows, hours?, fileName}
  const [start,setStart]=React.useState('');
  const [end,setEnd]=React.useState('');
  const [err,setErr]=React.useState('');
  const fileRef=React.useRef();

  const handle=async(file)=>{
    if(!file) return; setErr('');
    try{
      const raw=await window.__posReadFile(file);
      if(!raw||raw.length<2){ setErr('ไฟล์ว่างหรืออ่านไม่ได้'); return; }
      const header=raw[0].map(c=>String(c||'').trim());
      const hourCols=header.map((h,i)=>/^\d{1,2}:00$/.test(h)?i:-1).filter(i=>i>=0);
      const rng=dpRangeFromName(file.name); setStart(rng.start); setEnd(rng.end);

      if(hourCols.length>=5){
        // ----- hourly file -----
        const ni=dpDetectCol(header,['ชื่อสินค้า','สินค้า','เมนู','name','menu']);
        const qi=dpDetectCol(header,['จำนวนการขาย','จำนวน','qty','ขาย']);
        const ai=dpDetectCol(header,['ยอดก่อนลด','ยอดขาย','ยอดรวม','sales','amount']);
        const rows=[]; const hours=new Array(24).fill(0);
        for(let r=1;r<raw.length;r++){
          const row=raw[r]; if(!row) continue;
          const first=String(row[0]||'').trim().toLowerCase();
          const name=ni>=0?String(row[ni]||'').trim():'';
          if(first==='total' || (!name && first==='')) continue;
          if(!name) continue;
          const hrs=hourCols.map(ci=>dpNum(row[ci]));
          hrs.forEach((v,h)=>{ if(h<24) hours[h]+=v; });
          rows.push({ name, qty:qi>=0?dpNum(row[qi]):hrs.reduce((s,v)=>s+v,0), amount:ai>=0?dpNum(row[ai]):0, hours:hrs });
        }
        if(!rows.length){ setErr('ไม่พบแถวสินค้า'); return; }
        setParsed({ type:'hourly', rows, hours, fileName:file.name });
      } else {
        // ----- ranking file (MENU_NAME, BILLS, SALES) -----
        const ni=dpDetectCol(header,['menu','สินค้า','เมนู','ชื่อ','name','item','product']);
        const qi=dpDetectCol(header,['bills','bill','จำนวน','ขาย','qty','quantity','sold','units','ชิ้น','แก้ว']);
        const ai=dpDetectCol(header,['sales','ยอด','amount','total','revenue','รวม','บาท']);
        if(ni<0){ setErr('หาคอลัมน์ชื่อเมนูไม่เจอ'); return; }
        const rows=[];
        for(let r=1;r<raw.length;r++){
          const row=raw[r]; if(!row) continue;
          const name=String(row[ni]||'').trim();
          if(!name || name.toLowerCase()==='total') continue;
          rows.push({ name, qty:qi>=0?dpNum(row[qi]):0, amount:ai>=0?dpNum(row[ai]):0 });
        }
        if(!rows.length){ setErr('ไม่พบแถวข้อมูล'); return; }
        setParsed({ type:'ranking', rows, fileName:file.name });
      }
    }catch(e){ setErr('อ่านไฟล์ไม่สำเร็จ: '+e.message); }
  };

  const byName = Object.fromEntries(db.menus.map(m=>[dpNormName(m.name),m]));
  const matched = parsed? parsed.rows.filter(r=>byName[dpNormName(r.name)]).length : 0;

  const doImport=()=>{
    const base={ id:Date.now(), start, end, label: (start&&end)?dpReportLabel({start,end}):parsed.fileName };
    if(parsed.type==='hourly'){
      const totQty=parsed.rows.reduce((s,r)=>s+r.qty,0), totAmt=parsed.rows.reduce((s,r)=>s+r.amount,0);
      const rep={ ...base, hours:parsed.hours, qty:totQty, amount:totAmt, rows:parsed.rows };
      setDb(prev=>({ ...prev, hourlyReports:[rep, ...(prev.hourlyReports||[])] }));
      flash('นำเข้าข้อมูลรายชั่วโมงแล้ว');
    } else {
      const rep={ ...base, span:dpSpanOf(start,end), rows:parsed.rows };
      setDb(prev=>({ ...prev, menuReports:[rep, ...(prev.menuReports||[])] }));
      flash(`นำเข้าอันดับเมนู ${parsed.rows.length} รายการ`);
    }
    onClose();
  };

  return <Modal open title="นำเข้าข้อมูล POS วงใน" onClose={onClose} width={780}
    footer={<><Button variant="secondary" onClick={onClose}>ยกเลิก</Button>
      {parsed && <Button icon="check" onClick={doImport}>นำเข้า</Button>}</>}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {!parsed && <>
        <div onClick={()=>fileRef.current.click()} style={{border:'2px dashed var(--line)',borderRadius:14,padding:'38px 20px',textAlign:'center',cursor:'pointer',background:'var(--surface-2)'}}>
          <Icon name="upload" size={30} color="var(--accent)"/>
          <div style={{fontWeight:600,marginTop:10}}>เลือกไฟล์ CSV / Excel จาก POS วงใน</div>
          <div style={{fontSize:12.5,color:'var(--ink-3)',marginTop:5}}>รองรับทั้งไฟล์ "อันดับเมนูขายดี" และ "ยอดขายรายชั่วโมง" — ระบบแยกประเภทให้อัตโนมัติ</div>
          <input ref={fileRef} type="file" accept=".csv,.xlsx,.txt" style={{display:'none'}} onChange={e=>handle(e.target.files[0])}/>
        </div>
      </>}
      {err && <div style={{background:'var(--red-soft)',color:'var(--red)',padding:'10px 14px',borderRadius:10,fontSize:13}}>{err}</div>}
      {parsed && <>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
          <Badge tone="blue">{parsed.type==='hourly'?'ไฟล์รายชั่วโมง':'ไฟล์อันดับเมนู'}</Badge>
          <Badge tone="green">พบ {parsed.rows.length} รายการ</Badge>
          <Badge tone={matched===parsed.rows.length?'green':'orange'}>จับคู่เมนูในระบบ {matched}/{parsed.rows.length}</Badge>
        </div>
        <div className="r-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <Field label="ช่วงข้อมูล — วันเริ่ม"><Input type="date" value={start} onChange={e=>setStart(e.target.value)}/></Field>
          <Field label="ถึงวันที่"><Input type="date" value={end} onChange={e=>setEnd(e.target.value)}/></Field>
        </div>
        {parsed.type!=='hourly' && start && end && <div style={{fontSize:12.5,color:'var(--ink-3)'}}>จัดเป็น: <b>{DP_SPAN_LABEL[dpSpanOf(start,end)]}</b> (จากช่วงวันที่)</div>}
        <div style={{maxHeight:240,overflow:'auto',border:'1px solid var(--line-2)',borderRadius:12}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{color:'var(--ink-2)',fontSize:11.5,position:'sticky',top:0,background:'var(--surface)'}}>
              <th style={{textAlign:'left',padding:'9px 14px'}}>เมนู</th>
              <th style={{textAlign:'right',padding:'9px 10px'}}>จำนวน</th>
              <th style={{textAlign:'right',padding:'9px 14px'}}>ยอดขาย</th>
            </tr></thead>
            <tbody>{parsed.rows.slice(0,50).map((r,i)=>{ const ok=byName[dpNormName(r.name)];
              return <tr key={i} style={{borderTop:'1px solid var(--line-2)'}}>
                <td style={{padding:'7px 14px'}}>{r.name} {!ok&&<Badge tone="orange">ไม่พบ</Badge>}</td>
                <td className="tnum" style={{textAlign:'right',padding:'7px 10px'}}>{window.fmt(r.qty)}</td>
                <td className="tnum" style={{textAlign:'right',padding:'7px 14px'}}>{window.fmtB(r.amount)}</td>
              </tr>; })}</tbody>
          </table>
        </div>
        <p style={{fontSize:11.5,color:'var(--ink-3)'}}>ระบบจับคู่เมนูจาก "ชื่อ" — ชื่อที่ไม่ตรงกับเมนูในระบบจะยังนำเข้าได้ แต่จะไม่มีข้อมูล GP/กำไร</p>
      </>}
    </div>
  </Modal>;
}

// ---------- 24-hour heatmap strip ----------
function HourHeatmap({ hours }){
  const max=Math.max(1,...hours);
  return <div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(24,1fr)',gap:3}}>
      {hours.map((v,h)=>{ const t=v/max;
        return <div key={h} title={`${String(h).padStart(2,'0')}:00 — ${window.fmt(v)} ชิ้น`}
          style={{height:46,borderRadius:6,background:v?`color-mix(in srgb, var(--accent) ${Math.round(15+t*85)}%, var(--chip))`:'var(--chip)',
            display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:3,position:'relative'}}>
          <span style={{fontSize:9,fontWeight:700,color:t>0.5?'#fff':'var(--ink-3)'}}>{v||''}</span>
        </div>; })}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(24,1fr)',gap:3,marginTop:5}}>
      {hours.map((v,h)=><div key={h} style={{textAlign:'center',fontSize:9,color:'var(--ink-3)'}}>{h%3===0?String(h).padStart(2,'0'):''}</div>)}
    </div>
  </div>;
}

// ---------- main page ----------
function DeepAnalytics({ go }){
  const { db, settings, flash, setDb } = useData();
  const estGP = settings.estGP ?? 0.65;
  const comm = settings.lineCommission ?? 0.32;
  const thr = settings.gpAlertThreshold ?? 0.5;
  const [imp,setImp]=React.useState(false);

  const priced = db.menus.filter(m=>m.priceStore>0);
  const eco = priced.map(m=>({ m, e: window.menuEconomics(db,m) }));
  const withRecipe = eco.filter(x=>x.e.hasRecipe);
  const fallback = eco.filter(x=>!x.e.hasRecipe && x.m.status==='ขาย');

  // #1 GP per menu
  const gpRows=[...withRecipe].sort((a,b)=>b.e.gpStorePct-a.e.gpStorePct);
  const topGP=gpRows.slice(0,8).map(x=>({label:x.m.name,value:x.e.gpStorePct*100,color:'var(--accent)'}));
  const lowGP=[...gpRows].reverse().slice(0,8).map(x=>({label:x.m.name,value:x.e.gpStorePct*100,color:'var(--red)'}));
  const avgGP = withRecipe.length? withRecipe.reduce((s,x)=>s+x.e.gpStorePct,0)/withRecipe.length : 0;

  // #4 LINE MAN net per menu
  const lineSorted = priced.filter(m=>m.priceLine>0).map(m=>{
    const e=window.menuEconomics(db,m); const lineNet=m.priceLine*(1-comm);
    return { m, e, lineNet, profit:e.hasRecipe?lineNet-e.total:null, pct:e.hasRecipe?(lineNet-e.total)/m.priceLine:null, hasRecipe:e.hasRecipe };
  }).filter(r=>r.hasRecipe).sort((a,b)=>b.pct-a.pct);
  const months=window.aggregateByMonth(db); const curM=months[months.length-1];
  const lineGrossProfit=(curM?curM.line:0)*(1-comm)*estGP;

  // #2 menu ranking reports
  const menuReports=db.menuReports||[];
  const [span,setSpan]=React.useState('all');
  const visReports = span==='all'? menuReports : menuReports.filter(r=>(r.span||dpSpanOf(r.start,r.end))===span);
  const [repId,setRepId]=React.useState(null);
  const activeRep = visReports.find(r=>r.id===repId) || visReports[0] || null;
  const rankRows = activeRep? dpJoinEconomics(db, activeRep.rows).sort((a,b)=>b.qty-a.qty) : [];
  const totQty=rankRows.reduce((s,x)=>s+x.qty,0), totAmt=rankRows.reduce((s,x)=>s+x.amount,0), totProfit=rankRows.reduce((s,x)=>s+(x.profit||0),0);
  const lowGpSellers=rankRows.filter(x=>x.gpPct!=null && x.gpPct<thr && x.qty>0).slice(0,10);

  // #5 hourly reports
  const hourlyReports=db.hourlyReports||[];
  const [hrId,setHrId]=React.useState(null);
  const activeHr=hourlyReports.find(r=>r.id===hrId)||hourlyReports[0]||null;
  const hours=activeHr? activeHr.hours : null;
  const peakHours=hours? hours.map((v,h)=>({h,v})).sort((a,b)=>b.v-a.v).slice(0,3).filter(x=>x.v>0) : [];

  return <div className="view-enter" style={{display:'flex',flexDirection:'column',gap:22}}>

    {/* KPIs */}
    <div className="r-2col" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
      <Stat label="GP เฉลี่ย หน้าร้าน" value={window.fmtPct(avgGP)} icon="store" tone="#0071e3" sub={`${withRecipe.length} เมนูมีสูตร`}
        info="GP เฉลี่ยของเมนูที่มีสูตร · ร้านกาแฟที่ดีควรอยู่ 60–70% — ต่ำกว่า 55% ควรขึ้นราคาหรือลดต้นทุน"/>
      <Stat label="เมนูใช้ต้นทุนสำรอง" value={window.fmt(fallback.length)} icon="recipe" tone={fallback.length?'var(--orange)':'var(--green)'} sub="ยังไม่มีสูตรต้นทุนจริง"
        info="เมนูที่ยังไม่ได้ใส่สูตร ระบบจึงประมาณต้นทุนจาก GP เฉลี่ยแทน — ควรทยอยให้เหลือ 0 เพื่อให้ต้นทุน/GP แม่นยำ"/>
      <Stat label="กำไร LINE MAN เดือนล่าสุด" value={window.fmtB(lineGrossProfit)} icon="wallet" tone="#30a46c" sub={`หลังหักคอม ${window.fmtPct(comm,0)} · อิง GP ${window.fmtPct(estGP,0)}`}
        info={`ประมาณกำไรขั้นต้นจากยอด LINE MAN เดือนล่าสุด = ยอดไลน์ × (1−ค่าคอม ${window.fmtPct(comm,0)}) × GP เฉลี่ย ${window.fmtPct(estGP,0)} · ปรับค่าได้ในหน้าตั้งค่า`}/>
      <Stat label="รายงานที่นำเข้า" value={window.fmt(menuReports.length+hourlyReports.length)} icon="chart" sub={`อันดับเมนู ${menuReports.length} · รายชั่วโมง ${hourlyReports.length}`}/>
    </div>

    {/* #1 GP per menu */}
    <div className="r-stack" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <Card>
        <SectionTitle sub="GP% หน้าร้านสูงสุด (เมนูที่มีสูตรต้นทุน)" info="GP% = (ราคาขาย − ต้นทุน) ÷ ราคาขาย ยิ่งสูงยิ่งกำไรต่อแก้วดี">เมนูกำไรดีสุด</SectionTitle>
        {topGP.length? <HBars items={topGP} valueFmt={v=>v.toFixed(1)+'%'}/> : <Empty icon="recipe" title="ยังไม่มีสูตรเมนู" sub="เพิ่มสูตรในหน้าเมนู"/>}
      </Card>
      <Card>
        <SectionTitle sub="GP% หน้าร้านต่ำสุด — ควรทบทวนราคา/สูตร" info="เมนูกำไรต่อแก้วน้อย อาจต้องขึ้นราคาหรือลดต้นทุน">เมนูกำไรน้อยสุด</SectionTitle>
        {lowGP.length? <HBars items={lowGP} color="var(--red)" valueFmt={v=>v.toFixed(1)+'%'}/> : <Empty icon="recipe" title="ยังไม่มีสูตรเมนู"/>}
      </Card>
    </div>

    {/* #4 LINE MAN net */}
    <Card>
      <SectionTitle sub={`กำไรจริงต่อเมนู หลังหักค่าคอม LINE MAN ${window.fmtPct(comm,0)} และต้นทุน`}
        info="กำไรไลน์สุทธิ = ราคาไลน์แมน × (1 − ค่าคอม) − ต้นทุนเมนู · เฉพาะเมนูที่มีสูตรต้นทุน"
        right={<Button variant="ghost" size="sm" onClick={()=>go('products')}>ตั้งค่าราคา</Button>}>กำไรจริง LINE MAN ต่อเมนู</SectionTitle>
      {lineSorted.length? <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
          <thead><tr style={{color:'var(--ink-2)',fontSize:12}}>
            <th style={{textAlign:'left',padding:'11px 18px',fontWeight:600}}>เมนู</th>
            <th style={{textAlign:'right',padding:'11px 10px',fontWeight:600}}>ราคาไลน์</th>
            <th style={{textAlign:'right',padding:'11px 10px',fontWeight:600}}>หลังหักคอม</th>
            <th style={{textAlign:'right',padding:'11px 10px',fontWeight:600}}>ต้นทุน</th>
            <th style={{textAlign:'right',padding:'11px 10px',fontWeight:600}}>กำไรจริง/แก้ว</th>
            <th style={{textAlign:'right',padding:'11px 18px',fontWeight:600}}>GP ไลน์สุทธิ</th>
          </tr></thead>
          <tbody>{lineSorted.slice(0,30).map(({m,e,lineNet,profit,pct})=>(
            <tr key={m.id} style={{borderTop:'1px solid var(--line-2)'}}>
              <td style={{padding:'9px 18px'}}><div style={{fontWeight:600}}>{m.name}</div><div style={{fontSize:11.5,color:'var(--ink-3)'}}>{m.id}</div></td>
              <td className="tnum" style={{textAlign:'right',padding:'9px 10px'}}>{window.fmtB(m.priceLine)}</td>
              <td className="tnum" style={{textAlign:'right',padding:'9px 10px',color:'var(--ink-2)'}}>{window.fmtB(lineNet,0)}</td>
              <td className="tnum" style={{textAlign:'right',padding:'9px 10px',color:'var(--ink-2)'}}>{window.fmtB(e.total,1)}</td>
              <td className="tnum" style={{textAlign:'right',padding:'9px 10px',fontWeight:700,color:profit>=0?'var(--green)':'var(--red)'}}>{window.fmtB(profit,1)}</td>
              <td className="tnum" style={{textAlign:'right',padding:'9px 18px',fontWeight:600,color:pct>=0.5?'var(--green)':pct>=0.3?'var(--orange)':'var(--red)'}}>{window.fmtPct(pct)}</td>
            </tr>
          ))}</tbody>
        </table>
      </div> : <Empty icon="wallet" title="ยังไม่มีเมนูที่มีทั้งราคาไลน์และสูตรต้นทุน"/>}
    </Card>

    {/* #3 Fallback */}
    <Card>
      <SectionTitle sub="เมนูที่ขายอยู่แต่ยังไม่มีสูตรต้นทุน — ระบบใช้ต้นทุนสำรอง (ประมาณจาก GP เฉลี่ย)"
        info={`ต้นทุนสำรอง = ราคาขาย × (1 − GP เฉลี่ย ${window.fmtPct(estGP,0)}) ใช้แทนชั่วคราวจนกว่าจะใส่สูตรจริง`}
        right={<Button variant="ghost" size="sm" onClick={()=>go('menu')}>ไปใส่สูตร</Button>}>เมนูใช้ต้นทุนสำรอง (Fallback)</SectionTitle>
      {fallback.length? <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
          <thead><tr style={{color:'var(--ink-2)',fontSize:12}}>
            <th style={{textAlign:'left',padding:'11px 18px',fontWeight:600}}>เมนู</th>
            <th style={{textAlign:'left',padding:'11px 10px',fontWeight:600}}>หมวด</th>
            <th style={{textAlign:'right',padding:'11px 10px',fontWeight:600}}>ราคาร้าน</th>
            <th style={{textAlign:'right',padding:'11px 10px',fontWeight:600}}>ต้นทุนสำรอง (ประมาณ)</th>
            <th style={{textAlign:'center',padding:'11px 18px',fontWeight:600}}>สถานะ</th>
          </tr></thead>
          <tbody>{fallback.map(({m})=>(
            <tr key={m.id} style={{borderTop:'1px solid var(--line-2)'}}>
              <td style={{padding:'9px 18px'}}><div style={{fontWeight:600}}>{m.name}</div><div style={{fontSize:11.5,color:'var(--ink-3)'}}>{m.id}</div></td>
              <td style={{padding:'9px 10px'}}><Badge tone="gray">{m.category}</Badge></td>
              <td className="tnum" style={{textAlign:'right',padding:'9px 10px'}}>{window.fmtB(m.priceStore)}</td>
              <td className="tnum" style={{textAlign:'right',padding:'9px 10px',color:'var(--orange)'}}>~{window.fmtB(m.priceStore*(1-estGP),1)}</td>
              <td style={{textAlign:'center',padding:'9px 18px'}}><Badge tone="orange">ยังไม่มีสูตร</Badge></td>
            </tr>
          ))}</tbody>
        </table>
      </div> : <Empty icon="check" title="เยี่ยม! ทุกเมนูที่ขายมีสูตรต้นทุนจริงครบ"/>}
    </Card>

    {/* #2 menu ranking */}
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:6}}>
        <SectionTitle sub="อันดับเมนูขายดีตามช่วงเวลา + ตรวจเมนูขายดีแต่กำไรต่ำ">ยอดขายต่อเมนู (อันดับขายดี)</SectionTitle>
        <Button variant="secondary" size="sm" icon="upload" onClick={()=>setImp(true)}>นำเข้าข้อมูล POS วงใน</Button>
      </div>
      {menuReports.length===0 ? <Empty icon="chart" title="ยังไม่มีข้อมูลอันดับเมนู"
        sub="นำเข้าไฟล์ 'อันดับเมนูขายดี' จาก POS วงใน — ระบบจะจัดอันดับตามช่วงวันที่ (วัน/สัปดาห์/เดือน/ปี) และไขว้กับ GP เพื่อหาเมนูขายดีแต่กำไรต่ำ"
        action={<Button icon="upload" onClick={()=>setImp(true)}>นำเข้าข้อมูล</Button>}/> : <>

// ============ Menu + Recipe / Cost ============
const MENU_PREFIX={Beverage:'BEV',Food:'FOOD',Bakery:'BKY',Pastry:'PST',Dessert:'DST'};
function genMenuId(db,cat){
  const p=MENU_PREFIX[cat]||'MNU';
  let max=0; (db.menus||[]).forEach(m=>{ const mm=(m.id||'').match(new RegExp('^'+p+'(\\d+)$')); if(mm) max=Math.max(max,+mm[1]); });
  return p+String(max+1).padStart(3,'0');
}
function MenuModal({ open, onClose, initial }){
  const { db, upsert, renameId, flash, settings } = useData();
  const markup=settings.lineMarkup??0.45;
  const [f,setF]=React.useState({});
  const [idTouched,setIdTouched]=React.useState(false);
  const [lineTouched,setLineTouched]=React.useState(false);
  React.useEffect(()=>{ if(open){
    if(initial){ setF({...initial}); setIdTouched(true); setLineTouched(true); }
    else { const c=db.categories[0]||'Beverage'; setF({id:genMenuId(db,c),name:'',category:c,type:db.types[0]||'Coffee',priceStore:'',priceLine:'',status:'ขาย'}); setIdTouched(false); setLineTouched(false); }
  } },[open,initial]);
  const setCat=v=>setF(p=>({...p,category:v, id: idTouched?p.id:genMenuId(db,v)}));
  const setStore=v=>setF(p=>({...p,priceStore:v, priceLine: lineTouched?p.priceLine:(v?String(Math.round(+v*(1+markup))):'')}));
  const submit=()=>{
    if(!f.name){ flash('กรอกชื่อเมนู','err'); return; }
    if(dupName(db.menus, f.name, 'id', initial?initial.id:null)){ flash('มีเมนูชื่อนี้แล้ว','err'); return; }
    const id=(f.id||'').trim()||genMenuId(db,f.category);
    if(initial){
      if(id!==initial.id){
        if(db.menus.some(m=>m.id===id)){ flash('รหัสนี้มีอยู่แล้ว ลองรหัสอื่น','err'); return; }
        renameId('menus', initial.id, id);
      }
    } else if(db.menus.some(m=>m.id===id)){ flash('รหัสนี้มีอยู่แล้ว ลองแก้รหัส','err'); return; }
    upsert('menus',{...f,id,priceStore:+f.priceStore||0,priceLine:+f.priceLine||0});
    flash('บันทึกเมนูแล้ว'); onClose();
  };
  return <Modal open={open} onClose={onClose} title={initial?'แก้ไขเมนู':'เพิ่มเมนูใหม่'} width={520}
    footer={<><Button variant="secondary" onClick={onClose}>ยกเลิก</Button><Button onClick={submit} icon="check">บันทึก</Button></>}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <Field label="ชื่อเมนู"><Input autoFocus value={f.name||''} placeholder="เช่น อเมริกาโน่เย็น" onChange={e=>setF({...f,name:e.target.value})}/></Field>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Field label="ราคาหน้าร้าน (฿)"><Input type="number" inputMode="decimal" value={f.priceStore||''} placeholder="0" onChange={e=>setStore(e.target.value)}/></Field>
        <Field label="ราคา LINE MAN (฿)" hint={!lineTouched&&f.priceStore?`แนะนำอัตโนมัติ +${fmtPct(markup,0)}`:undefined}>
          <Input type="number" inputMode="decimal" value={f.priceLine||''} placeholder="0" onChange={e=>{setLineTouched(true);setF({...f,priceLine:e.target.value});}}/></Field>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        <Field label="หมวดหมู่"><TypeSelect value={f.category} options={db.categories} coll="categories" onChange={setCat}/></Field>
        <Field label="ประเภท"><TypeSelect value={f.type} options={db.types} coll="types" onChange={v=>setF({...f,type:v})}/></Field>
        <Field label="สถานะ"><Select value={f.status} options={['ขาย','หยุดขาย']} onChange={e=>setF({...f,status:e.target.value})}/></Field>
      </div>
      <Field label="รหัสเมนู" hint={initial?'แก้ได้ — ระบบจะอัปเดตสูตรที่เชื่อมอยู่ให้อัตโนมัติ':'สร้างให้อัตโนมัติ — แก้เองได้ถ้าต้องการ'}>
        <Input value={f.id||''} placeholder="อัตโนมัติ" onChange={e=>{setIdTouched(true);setF({...f,id:e.target.value.toUpperCase()});}}/></Field>
    </div>
  </Modal>;
}

function RecipeEditor({ open, onClose, menu }){
  const { db, setDb, flash } = useData();
  const [base,setBase]=React.useState([]);
  const [pkg,setPkg]=React.useState([]);
  const [opt,setOpt]=React.useState([]);
  React.useEffect(()=>{ if(open&&menu){
    setBase(db.recipeBase.filter(r=>r.menuId===menu.id).map(r=>({...r,_uid:Math.random()})));
    setPkg(db.recipePackage.filter(r=>r.menuId===menu.id).map(r=>({...r,_uid:Math.random()})));
    setOpt(db.recipeOption.filter(r=>r.menuId===menu.id).map(r=>({...r,_uid:Math.random()})));
  } },[open,menu]);
  if(!menu) return null;

  const ingMap=Object.fromEntries(db.ingredients.map(i=>[i.id,i]));
  const pkgMap=Object.fromEntries(db.packages.map(p=>[p.id,p]));
  const baseCost=base.reduce((s,l)=>{ const ing=ingMap[l.ingId]; return s+(l.qty*(ing?ing.costPerUnit:0)); },0);
  const pkgCost=pkg.reduce((s,l)=>{ const p=pkgMap[l.pkgId]; return s+(l.qty*(p?p.costPerPiece:0)); },0);
  // options: รวมต้นทุนวัตถุดิบของแต่ละตัวเลือก แล้วเฉลี่ย (ลูกค้าเลือก 1 ตัวต่อแก้ว)
  const optByOption={}; opt.forEach(l=>{ const ing=ingMap[l.ingId]; const lc=(+l.qty||0)*(ing?ing.costPerUnit:0); optByOption[l.optionId]=(optByOption[l.optionId]||0)+lc; });
  const optCosts=Object.values(optByOption); const optAvg=optCosts.length?optCosts.reduce((s,x)=>s+x,0)/optCosts.length:0;
  const total=baseCost+pkgCost+optAvg;
  const gpStore=menu.priceStore-total, gpStorePct=menu.priceStore?gpStore/menu.priceStore:0;
  // ราคา/กำไรแยกตามตัวเลือก
  const optSummary=Object.entries(optByOption).map(([oid,c])=>{ const o=db.options.find(x=>x.id===oid)||{}; const sell=menu.priceStore+(+o.addPrice||0); const cost=baseCost+pkgCost+c; return {oid,name:o.name||oid,addPrice:+o.addPrice||0,sell,cost,gp:sell?(sell-cost)/sell:0}; });

  const addBase=()=>{ const ing=db.ingredients[0]; setBase([...base,{_uid:Math.random(),menuId:menu.id,ingId:ing.id,qty:1,unit:ing.unit}]); };
  const addPkg=()=>{ const p=db.packages[0]; setPkg([...pkg,{_uid:Math.random(),menuId:menu.id,pkgId:p.id,qty:1,unit:p.unit}]); };
  const addOpt=()=>{ const o=db.options[0]||{}; const ing=db.ingredients[0]||{}; setOpt([...opt,{_uid:Math.random(),menuId:menu.id,optionId:o.id,group:o.group,type:o.type,ingId:ing.id,qty:1,unit:ing.unit}]); };
  const save=()=>{
    setDb(prev=>({
      ...prev,
      recipeBase:[...prev.recipeBase.filter(r=>r.menuId!==menu.id), ...base.map(l=>{const ing=ingMap[l.ingId];return {menuId:menu.id,ingId:l.ingId,qty:+l.qty||0,unit:ing?ing.unit:l.unit,costPerUnit:ing?ing.costPerUnit:0,lineCost:(+l.qty||0)*(ing?ing.costPerUnit:0)};})],
      recipePackage:[...prev.recipePackage.filter(r=>r.menuId!==menu.id), ...pkg.map(l=>{const p=pkgMap[l.pkgId];return {menuId:menu.id,pkgId:l.pkgId,qty:+l.qty||0,unit:p?p.unit:l.unit,costPerPiece:p?p.costPerPiece:0,lineCost:(+l.qty||0)*(p?p.costPerPiece:0)};})],
      recipeOption:[...prev.recipeOption.filter(r=>r.menuId!==menu.id), ...opt.map(l=>{const ing=ingMap[l.ingId]; const o=db.options.find(x=>x.id===l.optionId)||{}; return {menuId:menu.id,optionId:l.optionId,group:o.group||l.group||'',type:o.type||l.type||'',ingId:l.ingId,qty:+l.qty||0,unit:ing?ing.unit:l.unit,costPerUnit:ing?ing.costPerUnit:0,lineCost:(+l.qty||0)*(ing?ing.costPerUnit:0)};})],
    }));
    flash('บันทึกสูตรแล้ว'); onClose();
  };

  const lineRow=(l,arr,setArr,map,idKey,opts)=>{
    const item=map[l[idKey]];
    const cpu=item?(idKey==='ingId'?item.costPerUnit:item.costPerPiece):0;
    return <div key={l._uid} style={{display:'grid',gridTemplateColumns:'1fr 92px 80px 32px',gap:8,alignItems:'center'}}>
      <Select value={l[idKey]} options={opts} onChange={e=>setArr(arr.map(x=>x._uid===l._uid?{...x,[idKey]:e.target.value}:x))}/>
      <Input type="number" value={l.qty} onChange={e=>setArr(arr.map(x=>x._uid===l._uid?{...x,qty:e.target.value}:x))} style={{textAlign:'right'}}/>
      <span className="tnum" style={{fontSize:13.5,textAlign:'right',color:'var(--ink-2)'}}>{fmtB((+l.qty||0)*cpu,2)}</span>
      <IconBtn name="trash" danger size={15} onClick={()=>setArr(arr.filter(x=>x._uid!==l._uid))}/>
    </div>;
  };

  return <Modal open={open} onClose={onClose} title={`สูตร · ${menu.name}`} width={760}
    footer={<><Button variant="secondary" onClick={onClose}>ยกเลิก</Button><Button onClick={save} icon="check">บันทึกสูตร</Button></>}>
    <div style={{display:'flex',flexDirection:'column',gap:22}}>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${(opt.length?5:4)},1fr)`,gap:10}}>
        {[['ต้นทุนวัตถุดิบ',baseCost,'var(--ink)'],['ต้นทุนแพคเกจ',pkgCost,'var(--ink)'],...(opt.length?[['ออปชัน (เฉลี่ย/แก้ว)',optAvg,'var(--ink)']]:[]),['ต้นทุนรวม',total,'var(--accent)'],['GP หน้าร้าน',gpStorePct,'var(--green)']].map(([k,v,c],i,arr)=>
          <div key={i} style={{background:'var(--surface-2)',borderRadius:12,padding:'12px 14px'}}>
            <div style={{fontSize:11.5,color:'var(--ink-3)',marginBottom:4}}>{k}</div>
            <div className="tnum" style={{fontSize:18,fontWeight:700,color:c}}>{i===arr.length-1?fmtPct(v):fmtB(v,2)}</div>
          </div>)}
      </div>

      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h4 style={{fontSize:14.5,fontWeight:600,display:'flex',alignItems:'center',gap:7}}><Icon name="leaf" size={17} color="var(--green)"/>วัตถุดิบ</h4>
          <Button variant="soft" size="sm" icon="plus" onClick={addBase}>เพิ่มวัตถุดิบ</Button>
        </div>
        {base.length? <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 92px 80px 32px',gap:8,fontSize:11.5,color:'var(--ink-3)',fontWeight:600}}>
            <span>วัตถุดิบ</span><span style={{textAlign:'right'}}>ปริมาณ</span><span style={{textAlign:'right'}}>ต้นทุน</span><span></span></div>
          {base.map(l=>lineRow(l,base,setBase,ingMap,'ingId',db.ingredients.map(i=>({value:i.id,label:`${i.name} (${fmtB(i.costPerUnit,3)}/${i.unit})`}))))}
        </div> : <p style={{fontSize:13,color:'var(--ink-3)',padding:'8px 0'}}>ยังไม่มีวัตถุดิบ</p>}
      </div>

      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h4 style={{fontSize:14.5,fontWeight:600,display:'flex',alignItems:'center',gap:7}}><Icon name="box" size={17} color="var(--orange)"/>แพคเกจ</h4>
          <Button variant="soft" size="sm" icon="plus" onClick={addPkg}>เพิ่มแพคเกจ</Button>
        </div>
        {pkg.length? <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 92px 80px 32px',gap:8,fontSize:11.5,color:'var(--ink-3)',fontWeight:600}}>
            <span>แพคเกจ</span><span style={{textAlign:'right'}}>จำนวน</span><span style={{textAlign:'right'}}>ต้นทุน</span><span></span></div>
          {pkg.map(l=>lineRow(l,pkg,setPkg,pkgMap,'pkgId',db.packages.map(p=>({value:p.id,label:`${p.name} (${fmtB(p.costPerPiece,2)})`}))))}
        </div> : <p style={{fontSize:13,color:'var(--ink-3)',padding:'8px 0'}}>ยังไม่มีแพคเกจ</p>}
      </div>

      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <h4 style={{fontSize:14.5,fontWeight:600,display:'flex',alignItems:'center',gap:7}}><Icon name="sliders" size={17} color="var(--accent)"/>ออปชัน (ตัวเลือก)</h4>

function pkgCost(f){ const q=(+f.buyQty||0); return q? (+f.buyPrice||0)/q : 0; }

function mDetect(header, keys){ const norm=header.map(h=>String(h||'').trim().toLowerCase());
  for(let i=0;i<norm.length;i++){ if(keys.some(k=>norm[i]===k)) return i; }
  for(let i=0;i<norm.length;i++){ if(keys.some(k=>norm[i].startsWith(k))) return i; }
  for(let i=0;i<norm.length;i++){ if(keys.some(k=>norm[i].includes(k))) return i; }
  return -1; }

// ---------- sorting ----------
function mCodeNum(id){ const m=String(id||'').match(/(\d+)/); return m?+m[1]:0; }
const MASTER_SORT={
  ingredients:[['code','รหัส'],['category','หมวด'],['name','ชื่อ'],['price','ราคาซื้อ'],['cost','ต้นทุน/หน่วย']],

  overhead:[['name','รายการ'],['type','ประเภท'],['amount','จำนวน']],
};
function mSortVal(tab,it,field){
  switch(field){
    case 'code': return mCodeNum(it.id);
    case 'name': return it.name||'';
    case 'category': return it.category||'';
    case 'type': return it.type||'';
    case 'group': return it.group||'';
    case 'price': return tab==='options'?(+it.addPrice||0):(+it.buyPrice||0);
    case 'cost': return tab==='ingredients'?(+it.costPerUnit||0):(+it.costPerPiece||0);
    case 'amount': return +it.amount||0;
    default: return 0;
  }
}
function mSortRows(tab, arr, field, dir){
  const s=[...arr].sort((a,b)=>{ const va=mSortVal(tab,a,field), vb=mSortVal(tab,b,field);
    let c; if(typeof va==='string'||typeof vb==='string') c=String(va).localeCompare(String(vb),'th'); else c=va-vb;
    if(c===0) c=mCodeNum(a.id)-mCodeNum(b.id);
    return dir==='desc'?-c:c; });
  return s;
}

// ---- swipe-to-delete row ----
function SwipeRow({ cells, onEdit, onDelete }){
  const [dx,setDx]=React.useState(0);
  const st=React.useRef({x:0,active:false});
  const down=e=>{ const x=e.touches?e.touches[0].clientX:e.clientX; st.current={x,active:true}; };
  const move=e=>{ const s=st.current; if(!s.active) return; const x=e.touches?e.touches[0].clientX:e.clientX; let d=x-s.x; if(d>0) d=0; if(d<-130) d=-130; setDx(d); };
  const up=()=>{ const s=st.current; if(!s.active) return; s.active=false; const del=dx<-70; setDx(0); if(del) onDelete(); };
  const red=Math.min(1,-dx/70);
  return <tr
    onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
    onTouchStart={down} onTouchMove={move} onTouchEnd={up}
    style={{borderTop:'1px solid var(--line-2)',transform:`translateX(${dx}px)`,transition:st.current.active?'none':'transform .22s',
      background: dx<0?`rgba(224,53,43,${0.05+red*0.13})`:'', touchAction:'pan-y'}}>
    {cells}
    <td style={{padding:'8px 18px'}}>
      <div style={{display:'flex',gap:2,justifyContent:'flex-end',alignItems:'center'}}>
        {dx<-12 && <span style={{fontSize:12,fontWeight:700,color:'var(--red)',marginRight:4,whiteSpace:'nowrap'}}>{dx<-70?'ปล่อยเพื่อลบ':'ลบ'}</span>}
        <IconBtn name="edit" title="แก้ไข" onClick={()=>onEdit()}/>
        <IconBtn name="trash" title="ลบ" danger onClick={()=>onDelete()}/>
      </div>
    </td>
  </tr>;
}

function Master(){
  const { db, remove, setCollection, setDb, flash } = useData();

  const [sort,setSort]=React.useState('code');
  const [dir,setDir]=React.useState('asc');
  React.useEffect(()=>{ setQ(''); setSort(tab==='overhead'?'name':'code'); setDir('asc'); },[tab]);

  const open=(item)=>{ setEdit(item); setModal(true); };
  const ql=q.toLowerCase();
  const delWithUndo=(coll,item,keyField='id')=>{ const key=item[keyField]; remove(coll,key,keyField);
    flash('ลบ "'+(item.name||key)+'" แล้ว','ok',{label:'เลิกทำ',fn:()=>setDb(prev=>({...prev,[coll]:[item,...(prev[coll]||[])]}))}); };

  const downloadTemplate=()=>{ const sch=MASTER_SCHEMA[tab]; saveFileSmart(`master-${tab}-template.csv`, '\uFEFF'+sch.tmpl, 'text/csv', false); };
  const importCSV=async(file)=>{
    try{
      const rows=await window.__posReadFile(file);
      if(!rows||rows.length<2){ flash('ไม่พบข้อมูลในไฟล์','err'); return; }
      const header=rows[0].map(h=>String(h||'').trim());
      const sch=MASTER_SCHEMA[tab];
      const idx={}; sch.cols.forEach(([f,keys])=>{ idx[f]=mDetect(header,keys); });
      if(idx.name<0){ flash('หาคอลัมน์ชื่อไม่เจอ — ลองดาวน์โหลดเทมเพลตเป็นแนวทาง','err'); return; }
      const existing=[...db[tab]];
      const keyField=sch.key||'id';
      let added=0, updated=0;
      for(let r=1;r<rows.length;r++){
        const row=rows[r]; if(!row) continue;
        const name=String(row[idx.name]||'').trim();
        if(!name || name.toLowerCase()==='total') continue;
        const obj={};
        sch.cols.forEach(([f,keys])=>{ const c=idx[f]; if(c>=0 && row[c]!=null && String(row[c]).trim()!=='') obj[f]=String(row[c]).trim(); });
        ['buyPrice','buyQty','yield','addPrice','amount'].forEach(k=>{ if(obj[k]!=null) obj[k]=mNum(obj[k]); });
        obj.status=obj.status||'ใช้';
        if(tab==='ingredients'){ let y=obj.yield; if(y==null||isNaN(y)) y=1; if(y>1.5) y=y/100; obj.yield=Math.max(0.01,Math.min(1,y)); }
        if(tab==='overhead'){ obj.type=obj.type||'Fixed'; }
        else {
          let id=(obj.id||'').toString().trim().toUpperCase();
          if(!id) id=nextCode(existing,sch.code);
          obj.id=id;
          if(tab==='options') obj.group=obj.group||db.optionGroups[0]||'';
          if(sch.cost) obj[sch.costKey]=sch.cost(obj);
        }
        const k=obj[keyField];
        const i=existing.findIndex(x=>x[keyField]===k);
        if(i>=0){ existing[i]={...existing[i],...obj}; updated++; } else { existing.push(obj); added++; }
      }
      setDb(prev=>{
        const next={...prev,[tab]:existing};
        const listColl={ingredients:'ingCategories',packages:'pkgTypes',options:'optionGroups'}[tab];
        const listField={ingredients:'category',packages:'type',options:'group'}[tab];
        if(listColl){ const cur=prev[listColl]||[]; const add=[...new Set(existing.map(x=>x[listField]).filter(v=>v&&!cur.includes(v)))]; if(add.length) next[listColl]=[...cur,...add]; }
        return next;
      });
      flash(`นำเข้า ${added} รายการ`+(updated?` · อัปเดต ${updated}`:'')+(idx.id<0&&tab!=='overhead'?' · สร้างรหัสอัตโนมัติ':''));
    }catch(e){ flash('นำเข้าไม่สำเร็จ: '+e.message,'err'); }

    content=<MasterTable getKey={r=>r.id}

  } else if(tab==='options'){
    const rows=mSortRows(tab, db.options.filter(i=>!q||i.name.toLowerCase().includes(ql)||i.id.toLowerCase().includes(ql)), sort, dir);
    content=<MasterTable getKey={r=>r.id}
      headers={[{label:'ตัวเลือก'},{label:'กลุ่ม'},{label:'ประเภท'},{label:'เพิ่มราคา',align:'right'},{label:'สถานะ',align:'center'}]}

function BranchSection(){
  const { db, setDb, settings, setSettings, flash } = useData();
  const [name,setName]=React.useState('');
  const branches=db.branches||[];
  const add=()=>{ const n=name.trim(); if(!n)return; if(branches.includes(n)){flash('มีสาขานี้แล้ว','err');return;}
    setDb(p=>({...p,branches:[...(p.branches||[]),n]})); setName(''); flash('เพิ่มสาขาแล้ว'); };
  const removeBranch=(b)=>{ if(!confirm(`ลบสาขา "${b}"? (ยอดขายที่ผูกกับสาขานี้จะยังอยู่)`))return;
    setDb(p=>({...p,branches:(p.branches||[]).filter(x=>x!==b)}));
    if(settings.activeBranch===b) setSettings({...settings,activeBranch:'ทั้งหมด'}); };
  return <SettingsSection icon="store" title="สาขา" sub="จัดการสาขาเพื่อแยกและเปรียบเทียบยอดขาย">
    <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
      {branches.map(b=><span key={b} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:10,
        background:'var(--chip)',fontSize:13.5,fontWeight:500}}>{b}
        <button onClick={()=>removeBranch(b)} style={{color:'var(--ink-3)',display:'grid',placeItems:'center'}}><Icon name="close" size={14}/></button></span>)}

    <div style={{display:'flex',gap:10,maxWidth:420}}>
      <Input value={name} placeholder="ชื่อสาขาใหม่ เช่น สาขาเซ็นทรัล" onChange={e=>setName(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&add()}/>
      <Button icon="plus" onClick={add}>เพิ่ม</Button>

    <p style={{fontSize:11.5,color:'var(--ink-3)'}}>เมื่อมีมากกว่า 1 สาขา จะมีตัวเลือกกรองสาขาที่แถบบน และเลือกสาขาตอนบันทึกยอดขาย</p>
  </SettingsSection>;
}

// ---------- VAT ----------
function vatBreakdown(amount, settings){
  const rate=settings.vatRate??0.07;
  if(settings.vatMode==='exclusive'){ const vat=amount*rate; return {base:amount, vat, total:amount+vat, rate}; }
  const base=amount/(1+rate); return {base, vat:amount-base, total:amount, rate}; // inclusive
}

// ---------- Alerts ----------
function computeAlerts(db, settings){
  const out=[];
  const thr=settings.gpAlertThreshold??0.5;
  const lowGP=db.menus.map(m=>({m,e:menuEconomics(db,m)})).filter(x=>x.e.hasRecipe&&x.m.priceStore>0&&x.e.gpStorePct<thr);
  if(lowGP.length) out.push({tone:'red',icon:'cup',route:'products',
    title:`${lowGP.length} เมนู GP ต่ำกว่า ${fmtPct(thr,0)}`,
    detail:lowGP.slice(0,3).map(x=>`${x.m.name} (${fmtPct(x.e.gpStorePct,0)})`).join(', ')+(lowGP.length>3?' …':'')});
  const months=aggregateByMonth(db);
  if(months.length && settings.target>0){
    const cur=months[months.length-1];
    if(cur.total<settings.target) out.push({tone:'orange',icon:'target',route:'analytics',
      title:'ยอดเดือนล่าสุดต่ำกว่าเป้า', detail:`${fmtB(cur.total)} / เป้า ${fmtB(settings.target)} · ขาดอีก ${fmtB(settings.target-cur.total)}`});
  }
  const comm=settings.lineCommission??0.32;
  const notCov=db.menus.filter(m=>m.priceLine>0 && m.priceLine*(1-comm)<m.priceStore);
  if(notCov.length) out.push({tone:'orange',icon:'wallet',route:'products',
    title:`${notCov.length} เมนูราคาไลน์แมนไม่คุ้มค่าคอม`, detail:`อิงค่าคอม ${fmtPct(comm,0)} — ควรปรับราคาหรือส่วนบวก`});
  const noRecipe=db.menus.filter(m=>m.status==='ขาย'&&m.priceStore>0&&!computeMenuCost(db,m.id).hasRecipe).length;
  if(noRecipe>0) out.push({tone:'gray',icon:'recipe',route:'menu',
    title:`${noRecipe} เมนูยังไม่มีสูตรต้นทุน`, detail:'ใส่สูตรเพื่อให้คำนวณ GP และราคาแนะนำได้'});
  return out;
}

function AlertBell({ go }){
  const { db, settings } = useData();
  const [open,setOpen]=React.useState(false);
  const alerts=settings.alertsEnabled!==false ? computeAlerts(db,settings) : [];
  const keys = alerts.map(a=>a.title);
  const keySig = keys.join('|');
  // จำว่าผู้ใช้ "เห็นแล้ว" รายการไหนบ้าง — กระดิ่งจะขึ้นเลขแดงเฉพาะรายการใหม่ที่ยังไม่เคยเปิดดู
  const [seen,setSeen]=React.useState(()=>{ try{ return JSON.parse(localStorage.getItem('jebar_alerts_seen')||'[]'); }catch(e){ return []; } });
  // ตัดรายการที่หายไปแล้วออกจาก "เห็นแล้ว" เพื่อให้ปัญหาที่กลับมาใหม่เด้งเตือนอีกครั้ง
  React.useEffect(()=>{ const pruned=seen.filter(k=>keys.includes(k));
    if(pruned.length!==seen.length){ setSeen(pruned); try{ localStorage.setItem('jebar_alerts_seen',JSON.stringify(pruned)); }catch(e){} } },[keySig]);
  const unread = keys.filter(k=>!seen.includes(k)).length;
  const markSeen=()=>{ const merged=[...new Set([...seen,...keys])]; setSeen(merged); try{ localStorage.setItem('jebar_alerts_seen',JSON.stringify(merged)); }catch(e){} };
  const ref=React.useRef();
  React.useEffect(()=>{ const h=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }; document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h); },[]);
  return <div ref={ref} style={{position:'relative'}} className="no-print">
    <button onClick={()=>{ const n=!open; setOpen(n); if(n) markSeen(); }} style={{width:40,height:40,borderRadius:11,display:'grid',placeItems:'center',
      background:open?'var(--accent-soft)':'var(--chip)',color:open?'var(--accent)':'var(--ink-2)',position:'relative'}}>
      <Icon name="bell" size={19}/>
      {unread>0 && <span style={{position:'absolute',top:6,right:6,minWidth:16,height:16,padding:'0 4px',borderRadius:8,
        background:'var(--red)',color:'#fff',fontSize:10,fontWeight:700,display:'grid',placeItems:'center',boxShadow:'0 0 0 2px var(--header)'}}>{unread}</span>}
    </button>
    {open && <div style={{position:'absolute',right:0,top:48,width:340,background:'var(--surface)',borderRadius:16,
      boxShadow:'var(--shadow-lg)',border:'1px solid var(--line-2)',zIndex:60,overflow:'hidden',animation:'pop .2s'}}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid var(--line-2)',fontWeight:600,fontSize:14.5,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        การแจ้งเตือน {alerts.length>0&&<Badge tone="red">{alerts.length}</Badge>}</div>
      <div style={{maxHeight:380,overflowY:'auto'}}>
        {alerts.length? alerts.map((a,i)=>(
          <button key={i} onClick={()=>{setOpen(false);go(a.route);}} style={{width:'100%',display:'flex',gap:12,padding:'13px 16px',
            borderBottom:'1px solid var(--line-2)',textAlign:'left',background:'transparent',transition:'background .15s'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--surface-2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{width:34,height:34,borderRadius:9,flexShrink:0,display:'grid',placeItems:'center',
              background:a.tone==='red'?'var(--red-soft)':a.tone==='orange'?'var(--orange-soft)':'var(--chip)',
              color:a.tone==='red'?'var(--red)':a.tone==='orange'?'var(--orange)':'var(--ink-2)'}}><Icon name={a.icon} size={17}/></div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>{a.title}</div>
            <div style={{fontSize:12,color:'var(--ink-3)',marginTop:2}}>{a.detail}</div></div>
          </button>
        )) : <div style={{padding:'34px 20px',textAlign:'center',color:'var(--ink-3)'}}>
          <Icon name="check" size={26}/><div style={{fontSize:13.5,marginTop:8,fontWeight:500}}>ไม่มีการแจ้งเตือน</div></div>}
      </div>
    </div>}
  </div>;
}

    <Button size="sm" variant="soft" icon="download" onClick={async()=>{ const r=await backupDownload(db, settings.askSaveLocation); if(r!=='cancel') setSettings({...settings,lastBackup:Date.now()}); }}>สำรองตอนนี้</Button>

function LockScreen({ onUnlock }){
  const { settings } = useData();
  const [entry,setEntry]=React.useState('');
  const [err,setErr]=React.useState(false);
  const press=(d)=>{ setErr(false); const v=(entry+d).slice(0,6); setEntry(v);
    if(v.length>=String(settings.pin).length && v===String(settings.pin)){ onUnlock(); }
    else if(v.length>=6 && v!==String(settings.pin)){ setErr(true); setTimeout(()=>setEntry(''),300); } };
  const submit=()=>{ if(entry===String(settings.pin)) onUnlock(); else { setErr(true); setTimeout(()=>setEntry(''),300);} };
  return <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:300,display:'grid',placeItems:'center'}}>
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:24,animation:'pop .3s'}}>

const pad2 = n => String(n).padStart(2,'0');
const pnum = v => { if(v==null) return 0; const n=parseFloat(String(v).replace(/[,\s฿]/g,'')); return isNaN(n)?0:n; };

function posThaiMonth(s){
  const M=window.THAI_MONTHS, MS=window.THAI_MONTHS_SHORT;
  s=(s||'').replace(/\./g,'').trim();
  for(let i=0;i<12;i++){ if(s.includes(MS[i].replace(/\./g,''))||s.includes(M[i])) return i; }
  return -1;
}
function posParseDate(v){
  if(v==null) return null;
  v=String(v).trim(); if(!v) return null;
  // excel serial
  if(/^\d+(\.\d+)?$/.test(v)){ const n=+v; if(n>1000&&n<100000) return new Date(Date.UTC(1899,11,30)+Math.round(n)*86400000).toISOString().slice(0,10); }
  let m=v.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/); // YYYY-MM-DD
  if(m){ let y=+m[1]; if(y>2500)y-=543; return `${y}-${pad2(m[2])}-${pad2(m[3])}`; }
  m=v.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{2,4})/); // DD/MM/YYYY
  if(m){ let y=+m[3]; if(y<100)y+=2000; if(y>2500)y-=543; return `${y}-${pad2(m[2])}-${pad2(m[1])}`; }
  m=v.match(/(\d{1,2})\s*([ก-๙]+\.?[ก-๙]*)\.?\s*(\d{2,4})/); // 1 พ.ค. 2569
  if(m){ const mi=posThaiMonth(m[2]); if(mi>=0){ let y=+m[3]; if(y<100)y+=2500; if(y>2500)y-=543; return `${y}-${pad2(mi+1)}-${pad2(m[1])}`; } }
  const d=new Date(v); if(!isNaN(d)) return d.toISOString().slice(0,10);
  return null;
}
function posMatchChannel(text){
  const t=(text||'').toString().toLowerCase();
  if(/line\s*man|lineman|ไลน์แมน|ไลน์แมน|line\b|ไลน์/.test(t)) return 'line';
  if(/หน้าร้าน|ที่ร้าน|dine|เคาน์เตอร์|counter|ทานที่ร้าน|กลับบ้าน|take\s*away|takeaway|walk|เงินสด|cash|qr|พร้อมเพย์|โอน/.test(t)) return 'store';
  if(/grab|foodpanda|panda|robinhood|shopee|true\s*food|7|เซเว่น|delivery|เดลิเวอ|อื่น|other/.test(t)) return 'other';
  return null;
}
const posClassify = t => posMatchChannel(t) || 'other';

// read xlsx/csv → array-of-arrays
function posParseCSV(text){
  text=text.replace(/^\uFEFF/,''); const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(cur);cur='';} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(c==='\r'){} else cur+=c; } }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(c=>(c||'').trim()!==''));
}
async function posXlsxRows(file){
  const buf=new Uint8Array(await file.arrayBuffer()); const dv=new DataView(buf.buffer);
  const rU16=o=>dv.getUint16(o,true),rU32=o=>dv.getUint32(o,true);
  let eocd=-1; for(let p=buf.length-22;p>=0;p--)if(rU32(p)===0x06054b50){eocd=p;break;}
  const cdCount=rU16(eocd+10); let ptr=rU32(eocd+16); const files={};
  for(let n=0;n<cdCount;n++){ const comp=rU16(ptr+10),cs=rU32(ptr+20),nl=rU16(ptr+28),el=rU16(ptr+30),cl=rU16(ptr+32),lo=rU32(ptr+42);
    const name=new TextDecoder().decode(buf.subarray(ptr+46,ptr+46+nl)); ptr+=46+nl+el+cl;
    const h=lo,hnl=rU16(h+26),hel=rU16(h+28),ds=h+30+hnl+hel,cd=buf.subarray(ds,ds+cs);
    let out; if(comp===0)out=cd; else out=new Uint8Array(await new Response(new Response(cd).body.pipeThrough(new DecompressionStream('deflate-raw'))).arrayBuffer());
    files[name]=new TextDecoder().decode(out); }
  const shared=[...(files['xl/sharedStrings.xml']||'').matchAll(/<si>([\s\S]*?)<\/si>/g)].map(si=>[...si[1].matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)].map(m=>m[1]).join(''));
  const dec=s=>(s||'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"');
  const wsName=Object.keys(files).filter(k=>/xl\/worksheets\/sheet\d+\.xml$/.test(k)).sort()[0];
  const xml=files[wsName]||''; const rows=[];
  for(const rm of xml.matchAll(/<row[^>]*>([\s\S]*?)<\/row>/g)){ const cells=[];
    for(const cm of rm[1].matchAll(/<c r="([A-Z]+)\d+"(?:[^>]*t="([^"]*)")?[^>]*>([\s\S]*?)<\/c>/g)){
      const col=cm[1].replace(/\d+/,''),type=cm[2],inner=cm[3]; let val='';
      if(type==='s'){const vm=inner.match(/<v>(\d+)<\/v>/);if(vm)val=shared[+vm[1]];}
      else{const vm=inner.match(/<v>([\s\S]*?)<\/v>/);if(vm)val=vm[1];}
      const ci=col.split('').reduce((a,ch)=>a*26+(ch.charCodeAt(0)-64),0)-1; cells[ci]=dec(val); }
    rows.push(cells); }

async function posReadFile(file){

// core: rows → {buckets, preview, format, info}
function posAnalyze(rows){
  if(!rows||rows.length<2) return {error:'ไฟล์ว่างหรืออ่านไม่ได้'};
  // header row = first row that has >=2 non-empty cells; skip title rows above it
  let hi=0; for(let i=0;i<Math.min(rows.length,8);i++){ if(rows[i].filter(c=>(c||'').toString().trim()!=='').length>=2){ hi=i; break; } }
  const header=rows[hi].map(h=>(h||'').toString().trim());
  const hl=header.map(h=>h.toLowerCase());
  const data=rows.slice(hi+1).filter(r=>r.some(c=>(c||'').toString().trim()!==''));
  if(!data.length) return {error:'ไม่พบแถวข้อมูล'};

  let dateIdx=hl.findIndex(h=>h.includes('วันที่')||h.includes('date')||h==='วัน'||h.includes('วัน '));
  if(dateIdx<0){ let best=-1,bn=0; for(let c=0;c<header.length;c++){ let n=0; for(const r of data.slice(0,25)) if(posParseDate(r[c]))n++; if(n>bn){bn=n;best=c;} } if(bn>=Math.min(3,data.length))dateIdx=best; }
  if(dateIdx<0) return {error:'หาคอลัมน์วันที่ไม่เจอ — ตรวจสอบว่าไฟล์มีคอลัมน์ "วันที่"'};

  const channelCols=[]; header.forEach((h,i)=>{ if(i===dateIdx)return; const b=posMatchChannel(h); if(b)channelCols.push({idx:i,bucket:b,name:h}); });
  let chIdx=hl.findIndex(h=>h.includes('ช่องทาง')||h.includes('channel')||h.includes('platform')||h.includes('ประเภทการขาย')||h.includes('แหล่งขาย')||h.includes('source'));

  // optional: number-of-bills / transactions column
  const billsIdx=hl.findIndex((h,i)=>i!==dateIdx && (h.includes('bills')||h==='bill'||h.includes('จำนวนบิล')||h.includes('บิล')||h.includes('orders')||h.includes('ออเดอร์')||h.includes('ใบเสร็จ')||h.includes('receipt')||h.includes('transactions')));

  function pickAmount(ex){
    const prefs=['ยอดขายสุทธิ','ยอดสุทธิ','สุทธิ','net sales','net amount','net','ยอดขายรวม','ยอดรวม','ยอดขาย','total sales','grand total','total','รวมเงิน','รวม','sales','amount','จำนวนเงิน','ยอด'];
    for(const p of prefs){ const i=hl.findIndex((h,idx)=>!ex.includes(idx)&&h.includes(p)); if(i>=0)return i; }
    for(let c=header.length-1;c>=0;c--){ if(ex.includes(c))continue; let n=0; for(const r of data.slice(0,12)){ const s=(r[c]||'').toString().trim(); if(s&&/^[\d,.\s฿]+$/.test(s)&&pnum(s)>0)n++; } if(n>=2)return c; }
    return -1;
  }

  const buckets={}; let unparsed=0, format, amtName='';
  const B=d=>buckets[d]||(buckets[d]={store:0,line:0,other:0,bills:0});
  if(channelCols.length>0 && chIdx<0){
    format='by-channel'; amtName=channelCols.map(c=>c.name).join(', ');
    for(const r of data){ const d=posParseDate(r[dateIdx]); if(!d){unparsed++;continue;} const b=B(d); for(const c of channelCols)b[c.bucket]+=pnum(r[c.idx]); if(billsIdx>=0)b.bills+=pnum(r[billsIdx]); }
  } else if(chIdx>=0){
    format='channel-rows'; const ai=pickAmount([chIdx,dateIdx]); amtName=ai>=0?header[ai]:''; 
    if(ai<0) return {error:'หาคอลัมน์ยอดเงินไม่เจอ'};
    for(const r of data){ const d=posParseDate(r[dateIdx]); if(!d){unparsed++;continue;} const b=B(d); b[posClassify(r[chIdx])]+=pnum(r[ai]); if(billsIdx>=0)b.bills+=pnum(r[billsIdx]); }
  } else {
    format='total'; const ai=pickAmount([dateIdx,billsIdx].filter(x=>x>=0)); amtName=ai>=0?header[ai]:'';
    if(ai<0) return {error:'หาคอลัมน์ยอดเงินไม่เจอ'};
    for(const r of data){ const d=posParseDate(r[dateIdx]); if(!d){unparsed++;continue;} const b=B(d); b.store+=pnum(r[ai]); if(billsIdx>=0)b.bills+=pnum(r[billsIdx]); }
  }
  const preview=Object.keys(buckets).sort().map(d=>({date:d,...buckets[d],total:buckets[d].store+buckets[d].line+buckets[d].other}));
  if(!preview.length) return {error:'อ่านข้อมูลได้ แต่แปลงวันที่ไม่สำเร็จ'};
  const hasBills=billsIdx>=0 && preview.some(p=>p.bills>0);
  return { preview, format, unparsed, dateCol:header[dateIdx], amtName, channels:channelCols.map(c=>c.name), grand:preview.reduce((s,p)=>s+p.total,0), hasBills, billsCol: billsIdx>=0?header[billsIdx]:null };
}

  if(!j || !Array.isArray(j.sales)) throw new Error('รูปแบบข้อมูลไม่ถูกต้อง');
