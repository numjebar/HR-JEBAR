<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Diamond icon — electric blue, 4 facets (gem cut look) -->
  <polygon points="26,26 50,26 26,50" fill="#1e40af"/>
  <polygon points="2,26 26,26 26,50" fill="#1d4ed8"/>
  <polygon points="26,2 50,26 26,26" fill="#2563eb"/>
  <polygon points="26,2 2,26 26,26" fill="#60a5fa" filter="url(#glow)"/>
  <polygon points="26,2 19,13 33,13" fill="#bfdbfe" opacity="0.7"/>

  <!-- LUCID wordmark -->
  <text x="62" y="37"
    font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-weight="800" font-size="32" fill="#0f172a" letter-spacing="0.5">LUCID</text>

  <!-- Subtitle -->
  <text x="63" y="50"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
    font-weight="600" font-size="7.8" fill="#64748b" letter-spacing="2.2">AI BUSINESS PLATFORM</text>
</svg>
