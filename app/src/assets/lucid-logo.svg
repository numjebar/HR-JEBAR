<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Diamond icon — dark navy fill -->
  <polygon points="26,1 51,26 26,51 1,26" fill="#0f172a"/>

  <!-- Light beam — wide soft glow -->
  <line x1="11" y1="42" x2="41" y2="10" stroke="#2563eb" stroke-width="9" stroke-linecap="round" opacity="0.22"/>
  <!-- Light beam — sharp core -->
  <line x1="11" y1="42" x2="41" y2="10" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- LUCID wordmark -->
  <text x="62" y="37"
    font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-weight="800" font-size="32" fill="#0f172a" letter-spacing="0.5">LUCID</text>

  <!-- Subtitle -->
  <text x="63" y="50"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
    font-weight="600" font-size="7.8" fill="#64748b" letter-spacing="2.2">AI BUSINESS PLATFORM</text>
</svg>
