<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Dark background -->
  <rect width="48" height="48" rx="10" fill="#0f172a"/>
  <!-- Main diamond -->
  <polygon points="24,4 44,24 24,44 4,24" fill="#1B5EA8"/>
  <!-- Top half lighter accent -->
  <polygon points="24,4 44,24 4,24" fill="#2d7dd2" opacity="0.7"/>
  <!-- Inner highlight diamond -->
  <polygon points="24,13 35,24 24,35 13,24" fill="#ffffff" opacity="0.12"/>
  <!-- Thin outline -->
  <polygon points="24,4 44,24 24,44 4,24" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
</svg>
