<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEBAR OPS Access</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --danger-bg: #fff1f2;
      --danger-line: #fecdd3;
      --danger-text: #be123c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #eef4ff, var(--bg) 45%);
      font-family: Arial, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    .spinner {
      width: 54px;
      height: 54px;
      margin: 0 auto 18px;
      border: 4px solid #dbeafe;
      border-top-color: var(--brand);
      border-radius: 999px;
      animation: spin 0.9s linear infinite;
    }
    .alert {
      background: var(--danger-bg);
      border: 1px solid var(--danger-line);
      color: var(--danger-text);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 16px;
      line-height: 1.6;
      font-size: 14px;
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 14px; color: var(--muted); line-height: 1.6; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 22px; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
    }
    .primary { background: var(--brand); color: white; }
    .primary:hover { background: var(--brand-dark); }
    .secondary { border: 1px solid var(--line); color: var(--text); background: white; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    (function () {
      try {
        var employeeToken = localStorage.getItem('hr_employee_session_token');
        if (employeeToken) {
          window.location.replace('/emp');
          return;
        }
        window.location.replace('https://jebar-data.je-bar.workers.dev/');
      } catch (err) {
        window.location.replace('https://jebar-data.je-bar.workers.dev/');
      }
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>กำลังเปิดระบบร้าน / OPS</h1>
    <p>ระบบจะพาไปยัง JEBAR DATA อัตโนมัติในอีกไม่กี่วินาที</p>
    <p>ถ้ายังไม่ไป กดปุ่มด้านล่างได้เลย</p>
    <div id="employeeAlert" class="alert" style="display:none;">
      บัญชีพนักงานไม่มีสิทธิ์เข้าใช้งานหน้า OPS ระบบจะพากลับไปหน้าแอปพนักงานอัตโนมัติ
    </div>
    <div class="actions">
      <a class="primary" href="https://jebar-data.je-bar.workers.dev/">เปิด JEBAR DATA</a>
      <a class="secondary" href="https://hr-jebar.pages.dev/">กลับ HR JEBAR</a>
    </div>
  </div>
  <script>
    try {
      var employeeToken = localStorage.getItem('hr_employee_session_token');
      if (employeeToken) {
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('h1').textContent = 'ไม่มีสิทธิ์เข้าใช้งาน OPS';
        document.querySelectorAll('p')[0].textContent = 'บัญชีพนักงานไม่สามารถเปิดระบบร้าน / OPS ได้';
        document.querySelectorAll('p')[1].textContent = 'ระบบจะพากลับไปหน้าแอปพนักงาน';
        document.getElementById('employeeAlert').style.display = 'block';
      }
    } catch (err) {}
  </script>
</body>
</html>
